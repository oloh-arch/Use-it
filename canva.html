<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Flow Board</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #090d16;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #f8fafc;
        }

        /* Ambient background canvas wrapper */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Foreground operational layer */
        .dashboard {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #f8fafc;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Control Input Unit */
        .task-input-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.8);
            border-radius: 8px;
            padding: 12px;
            color: #f8fafc;
            font-size: 0.95rem;
            outline: none;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            border-color: #38bdf8;
        }

        .add-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Grid Framework for Mobile Layout */
        .board-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .column {
            background: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(51, 65, 85, 0.4);
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            max-height: 220px;
        }

        .column h2 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            color: #94a3b8;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .task-item {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(51, 65, 85, 0.5);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        /* Interactive flow step buttons */
        .step-btn {
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .step-btn.done {
            background: rgba(52, 211, 153, 0.2);
            border-color: #34d399;
            color: #34d399;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="flowCanvas"></canvas>

    <div class="dashboard">
        <header>
            <h1>Visual Flow Board</h1>
        </header>

        <div class="task-input-bar">
            <input type="text" id="taskInput" placeholder="Enter a mission metric...">
            <button class="add-btn" onclick="createNewTask()">Create</button>
        </div>

        <div class="board-grid">
            <div class="column">
                <h2>Backlog Tasks (<span id="todoCount">0</span>)</h2>
                <ul class="task-list" id="todoList"></ul>
            </div>

            <div class="column">
                <h2>Completed Items (<span id="doneCount">0</span>)</h2>
                <ul class="task-list" id="doneList"></ul>
            </div>
        </div>
    </div>
